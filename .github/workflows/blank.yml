name: Windows 11 LTSC Ultra-Graphics Cloud Desktop
on: [workflow_dispatch]

jobs:
  launch-windows-11-ltsc:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy Windows 11 LTSC with Max Graphics (Dockurr)
        run: |
          # Jalankan container Windows 11 LTSC (win11ltsc)
          # Menggunakan alokasi RAM 8GB dan tipe grafis virtio untuk akselerasi visual
          docker run -d --name cloud-windows-11-max \
            --privileged \
            --device=/dev/kvm \
            --cap-add NET_ADMIN \
            -p 8006:8006 \
            -p 3389:3389/tcp \
            -p 3389:3389/udp \
            -e VERSION="win11ltsc" \
            -e RAM_SIZE="8G" \
            -e CPU_CORES="2" \
            -e ARGUMENTS="-vga virtio -display none" \
            dockurr/windows

      - name: Keep Alive & Connection Guide
        run: |
          IP_TAILSCALE=$(tailscale ip -4)
          
          echo "=============================================="
          echo "SERVER WINDOWS 11 LTSC GRAFIS MAKSIMAL SIAP!"
          echo "IP Tailscale Anda: $IP_TAILSCALE"
          echo "----------------------------------------------"
          echo "PILIHAN CARA AKSES:"
          echo "1. MONITOR VIA BROWSER (Instalasi Otomatis):"
          echo "   http://$IP_TAILSCALE:8006"
          echo "2. VIA REMOTE DESKTOP / RDP (Grafis 60 FPS):"
          echo "   Alamat IP: $IP_TAILSCALE"
          echo "   Username : docker"
          echo "   Password : (Kosongkan saja)"
          echo "=============================================="
          
          sleep 21600
